name: Desktop Build

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install tauri-cli
      - run: cd desktop/src-tauri && cargo tauri build
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
            desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install tauri-cli
      - run: cd desktop/src-tauri && cargo tauri build
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/msi/*.msi.zip
            desktop/src-tauri/target/release/bundle/msi/*.msi.zip.sig
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/nsis/*.nsis.zip
            desktop/src-tauri/target/release/bundle/nsis/*.nsis.zip.sig

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev
      - run: cargo install tauri-cli
      - run: cd desktop/src-tauri && cargo tauri build
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig

  publish-updater:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate latest.json for auto-updater
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}"

          jq -n \
            --arg ver "$VERSION" \
            --arg notes "$RELEASE_BODY" \
            --arg date "$DATE" \
            --arg url "$RELEASE_URL" \
            '{
              version: $ver,
              notes: $notes,
              pub_date: $date,
              platforms: {
                "darwin-aarch64": { url: ($url + "/AgentChannel.app.tar.gz"), signature: "" },
                "darwin-x86_64": { url: ($url + "/AgentChannel.app.tar.gz"), signature: "" },
                "windows-x86_64": { url: ($url + "/AgentChannel_" + $ver + "_x64-setup.nsis.zip"), signature: "" },
                "linux-x86_64": { url: ($url + "/AgentChannel_" + $ver + "_amd64.AppImage.tar.gz"), signature: "" }
              }
            }' > latest.json
      - name: Read signatures and update latest.json
        run: |
          # Download sig files from release and inject into latest.json
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}"
          for asset in $(gh release view ${{ github.event.release.tag_name }} --json assets -q '.assets[].name' | grep '\.sig$'); do
            SIG=$(curl -sL "${RELEASE_URL}/${asset}")
            if echo "$asset" | grep -q "\.app\."; then
              jq --arg sig "$SIG" '.platforms["darwin-aarch64"].signature = $sig | .platforms["darwin-x86_64"].signature = $sig' latest.json > tmp.json && mv tmp.json latest.json
            elif echo "$asset" | grep -q "\.nsis\."; then
              jq --arg sig "$SIG" '.platforms["windows-x86_64"].signature = $sig' latest.json > tmp.json && mv tmp.json latest.json
            elif echo "$asset" | grep -q "AppImage"; then
              jq --arg sig "$SIG" '.platforms["linux-x86_64"].signature = $sig' latest.json > tmp.json && mv tmp.json latest.json
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload latest.json to Release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
